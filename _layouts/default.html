<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
  <meta name="google-site-verification" content="A6tGKS6Au8qsjAu1pLHuQjaDp0cm0EYggHluYl38uoA" />
  
  <script>
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>
<body>
  <canvas id="cursor-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; display: block; margin: 0; padding: 0;"></canvas>
  
  <div class="navbar">
    <a href="{{ '/' | relative_url }}">About</a>
    <a href="{{ '/blog.html' | relative_url }}">Blog</a>
    <a href="{{ '/qronicle.html' | relative_url }}">Qronicle</a>
    <a href="{{ '/team.html' | relative_url }}">Team</a>
    <a href="{{ '/contact.html' | relative_url }}">Contact</a>
    
    <div style="position: absolute; right: 20px; display: flex; align-items: center; gap: 15px;">
      <button id="theme-toggle">🌓 Toggle Theme</button>
      <input type="text" id="nav-search-input" placeholder="Search & press Enter..." style="padding: 5px 10px; border-radius: 15px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); width: 200px;">
    </div>
  </div>

  {{ content }}

  <div class="footer">
    <p>
      © 2026 Qurious-Qubit. All rights reserved |
      <a href="{{ '/contact.html' | relative_url }}">Contact</a><br>
      <small>If any copyrighted content has been used unintentionally, please contact us for prompt removal.</small>
    </p>
  </div>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const root = document.documentElement;

    toggleBtn.addEventListener('click', () => {
      const currentTheme = root.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      root.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      
      // Tell the rest of the site that the theme changed
      window.dispatchEvent(new CustomEvent('themeChanged', { detail: { theme: newTheme } }));
    });
  </script>
  
  <script>
    /* --- CURSOR CANVAS ANIMATION --- */
    const canvas = document.getElementById('cursor-canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let mouse = { x: -1000, y: -1000, vx: 0, vy: 0 };
    let lastMouse = { x: -1000, y: -1000 };
    
    let trailParticles = [];
    let boomParticles = [];

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('mousemove', (e) => {
      lastMouse.x = mouse.x;
      lastMouse.y = mouse.y;
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.vx = mouse.x - lastMouse.x;
      mouse.vy = mouse.y - lastMouse.y;
    });

    window.addEventListener('mousedown', (e) => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const numParticles = Math.floor(Math.random() * 15) + 20; 
      
      for (let i = 0; i < numParticles; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2; 
        boomParticles.push({
          x: e.clientX,
          y: e.clientY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: Math.random() * 4 + 1,
          life: 1.0,
          color: isDark ? `rgba(0, 255, 255,` : `rgba(211, 84, 0,` 
        });
      }
    });

    function animate() {
      ctx.clearRect(0, 0, width, height);
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

      if (mouse.x > 0 && mouse.y > 0) {
        for(let i = 0; i < 2; i++) {
          trailParticles.push({
            x: mouse.x + (Math.random() - 0.5) * 5, 
            y: mouse.y + (Math.random() - 0.5) * 5,
            vx: (mouse.vx * -0.1) + (Math.random() - 0.5) * 1.5,
            vy: (mouse.vy * -0.1) + (Math.random() - 0.5) * 1.5,
            size: Math.random() * 4 + 1.5, 
            life: 1.0,
            decay: Math.random() * 0.04 + 0.03 
          });
        }
      }

      for (let i = trailParticles.length - 1; i >= 0; i--) {
        let p = trailParticles[i];
        
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        p.size *= 0.95; 
        
        if (p.life <= 0 || p.size < 0.5) {
          trailParticles.splice(i, 1);
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          
          if (isDark) {
            const r = Math.floor(p.life * 255);
            const g = Math.floor(p.life * 255 + (1-p.life)*255);
            const b = 255;
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${p.life})`;
          } else {
            const r = 255;
            const g = Math.floor(p.life * 255);
            const b = Math.floor((p.life - 0.5) * 510);
            ctx.fillStyle = `rgba(${r}, ${Math.max(0, g)}, ${Math.max(0, b)}, ${p.life})`;
          }
          ctx.fill();
        }
      }

      if (mouse.x > 0 && mouse.y > 0) {
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, 2, 0, Math.PI * 2); 
        ctx.fillStyle = isDark ? '#ffffff' : '#333333';
        ctx.fill();
      }

      for (let i = boomParticles.length - 1; i >= 0; i--) {
        let p = boomParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02; 
        
        if (p.life <= 0) {
          boomParticles.splice(i, 1);
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = p.color + `${p.life})`;
          ctx.fill();
        }
      }

      mouse.vx *= 0.8;
      mouse.vy *= 0.8;
      requestAnimationFrame(animate);
    }
    animate();
  </script>

  <script>
    /* --- SEARCH REDIRECT LOGIC --- */
    /* This is what was missing! It listens for the Enter key and redirects to the search page */
    document.addEventListener("DOMContentLoaded", function() {
      const navSearch = document.getElementById('nav-search-input');
      if(navSearch) {
        navSearch.addEventListener('keypress', function(e) {
          if (e.key === 'Enter' && this.value.trim() !== '') {
            window.location.href = "{{ '/search.html' | relative_url }}?q=" + encodeURIComponent(this.value.trim());
          }
        });
      }
    });
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/mark.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const urlParams = new URLSearchParams(window.location.search);
      const query = urlParams.get('q');
      
      if (query) {
        // Only read the Exact Phrase (ep) parameter
        const isExactPhrase = urlParams.get('ep') === 'true';

        // Highlight text ONLY inside the main content area (keeps navbar safe)
        const contentArea = document.querySelector('.main-content');
        if (contentArea) {
          const instance = new Mark(contentArea);
          const options = {
            caseSensitive: false, // Always false now
            accuracy: "partially", // Always partially now
            separateWordSearch: !isExactPhrase, // Only toggles based on the Exact Phrase checkbox
            element: "mark",
            className: "search-highlight"
          };
          instance.mark(query, options);
        }
      }
    });
  </script>

  <style>
    /* Highlight Style */
    mark.search-highlight {
      background-color: #ffeb3b;
      color: #000;
      padding: 2px 0;
      border-radius: 3px;
    }
  </style>
</body>
</html>
