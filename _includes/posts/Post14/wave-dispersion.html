<div style="text-align: center; margin: 30px 0; padding: 20px; background: var(--card-bg, #1e1e1e); border: 1px solid var(--border-color, #444); border-radius: 8px; color: var(--text-color, white);">
  <canvas id="waveCanvas" width="600" height="300" style="background: #2d2d2d; border-radius: 4px; max-width: 100%;"></canvas>
  <br>
  
  <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; font-family: sans-serif; font-size: 14px;">
    <div>
      <strong>Wave 1 (Red)</strong><br>
      Frequency (ω₁): <input type="range" id="w1" min="1" max="5" step="0.1" value="2"><br>
      Gamma/Beta (β₁): <input type="range" id="b1" min="1" max="5" step="0.1" value="2">
    </div>
    <div>
      <strong>Wave 2 (Blue)</strong><br>
      Frequency (ω₂): <input type="range" id="w2" min="1" max="5" step="0.1" value="3"><br>
      Gamma/Beta (β₂): <input type="range" id="b2" min="1" max="5" step="0.1" value="3">
    </div>
  </div>
  
  <button id="linearBtn" style="margin-top: 15px; padding: 8px 16px; background: var(--accent-2, #3498db); color: white; border: none; border-radius: 4px; cursor: pointer;">
    Force Linear Relation (Constant Speed)
  </button>
  
  <p id="speedStatus" style="margin-top: 15px; font-weight: bold; color: #f39c12;"></p>
</div>

<script>
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  
  const w1Slider = document.getElementById('w1');
  const b1Slider = document.getElementById('b1');
  const w2Slider = document.getElementById('w2');
  const b2Slider = document.getElementById('b2');
  const linearBtn = document.getElementById('linearBtn');
  const statusTxt = document.getElementById('speedStatus');
  
  let time = 0;

  linearBtn.addEventListener('click', () => {
    b1Slider.value = w1Slider.value;
    b2Slider.value = w2Slider.value;
  });

  function drawWave(yOffset, w, b, color, label) {
    ctx.beginPath();
    for (let x = 0; x <= canvas.width; x++) {
      // Scaling x and t for visual purposes
      let y = Math.sin((w * time * 0.05) - (b * x * 0.02)) * 30;
      if (x === 0) ctx.moveTo(x, yOffset + y);
      else ctx.lineTo(x, yOffset + y);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.fillStyle = '#fff';
    ctx.font = '12px sans-serif';
    ctx.fillText(label, 10, yOffset - 35);
  }

  function drawSum(yOffset, w1, b1, w2, b2) {
    ctx.beginPath();
    for (let x = 0; x <= canvas.width; x++) {
      let y1 = Math.sin((w1 * time * 0.05) - (b1 * x * 0.02)) * 30;
      let y2 = Math.sin((w2 * time * 0.05) - (b2 * x * 0.02)) * 30;
      if (x === 0) ctx.moveTo(x, yOffset + (y1+y2)*0.8);
      else ctx.lineTo(x, yOffset + (y1+y2)*0.8);
    }
    ctx.strokeStyle = '#2ecc71'; // Green
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.fillStyle = '#fff';
    ctx.fillText("Sum (Wave 1 + Wave 2)", 10, yOffset - 45);
  }

  function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    time += 1;
    
    let w1 = parseFloat(w1Slider.value);
    let b1 = parseFloat(b1Slider.value);
    let w2 = parseFloat(w2Slider.value);
    let b2 = parseFloat(b2Slider.value);
    
    let v1 = (w1/b1).toFixed(2);
    let v2 = (w2/b2).toFixed(2);
    
    if (v1 === v2) {
        statusTxt.innerText = `Linear Relation: Both waves travel at speed ${v1}`;
        statusTxt.style.color = "#2ecc71";
    } else {
        statusTxt.innerText = `Non-Linear (Dispersion): Wave 1 speed = ${v1}, Wave 2 speed = ${v2}`;
        statusTxt.style.color = "#e74c3c";
    }
    
    drawWave(50, w1, b1, '#e74c3c', 'Wave 1');
    drawWave(130, w2, b2, '#3498db', 'Wave 2');
    drawSum(230, w1, b1, w2, b2);
  }
  
  animate();
</script>
