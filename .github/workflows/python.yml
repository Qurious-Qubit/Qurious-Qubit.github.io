name: Execute Python Scripts
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install beautifulsoup4 requests

      - name: Run scripts
        run: |
          python tools/alpha.py
          python tools/beta.py
          python tools/gamma.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          
          # This command checks if there are any new or modified files. 
          # It will ONLY commit and push if the Python scripts actually changed something, preventing infinite loops.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Regenerate all files" && git pull --rebase && git push)
